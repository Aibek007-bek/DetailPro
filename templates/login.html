<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — DetailPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="login-page">
    <div class="login-bg-glow login-glow-green"></div>
    <div class="login-bg-glow login-glow-orange"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-logo">
                    <i class="bi bi-shield-lock"></i>
                </div>
                <h1>DetailPro</h1>
                <p>Вход для сотрудников</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-login alert-{{ category }}" role="alert">
                            <i class="bi bi-exclamation-triangle"></i> {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}" class="login-form" autocomplete="off">
                <div class="form-group-cyber">
                    <label for="username">
                        <i class="bi bi-person"></i> Логин
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="form-control-cyber"
                        placeholder="Ваш логин"
                        required
                        autofocus
                    >
                </div>

                <div class="form-group-cyber">
                    <label for="password">
                        <i class="bi bi-key"></i> Пароль
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control-cyber"
                        placeholder="Ваш пароль"
                        required
                    >
                </div>

                <button type="submit" class="btn-login-cyber">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Войти
                </button>
            </form>

            <div class="login-hints">
                <a href="{{ url_for('track') }}" class="login-track-link">
                    <i class="bi bi-search"></i> Клиентам: проверить статус авто
                </a>
            </div>
        </div>
    </div>
</body>
</html>
