{% extends "base.html" %}

{% block title %}Ошибка {{ status_code }} — Auto Detailing CRM{% endblock %}

{% block content %}
<section class="page-header">
    <h2>Ошибка {{ status_code }}</h2>
    <p>{{ message }}</p>
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light mt-3">
        <i class="bi bi-arrow-left"></i> На главную
    </a>
</section>
{% endblock %}
